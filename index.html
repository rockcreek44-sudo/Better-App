<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2° Baits</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="brand">2° BAITSTM</div>
      <div class="tagline">BUILT ON THE WATER</div>
    </section>

    <section class="grid">
      <button class="card primary">
        <div class="icon">🐟</div>
        <h2>Log a Catch</h2>
        <p>Record a new fish</p>
      </button>

      <button class="card">
        <div class="icon">📍</div>
        <h2>My Trips</h2>
        <p>View your history</p>
      </button>

      <button class="card">
        <div class="icon">📊</div>
        <h2>Statistics</h2>
        <p>Analyze your data</p>
      </button>

      <button class="card">
        <div class="icon">⚙️</div>
        <h2>Settings</h2>
        <p>Preferences & gear</p>
      </button>
    </section>

    <footer>
      <div class="small-logo">2°</div>
      <p>BUILT BY ANGLERS. FOR ANGLERS.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
